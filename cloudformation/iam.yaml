AWSTemplateFormatVersion: '2010-09-09'
Description: IAM roles for EKS sandbox environment

Parameters:
  ClusterName:
    Type: String

Resources:
  ClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ClusterName}-cluster-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-cluster-role

  NodeGroupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ClusterName}-nodegroup-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-nodegroup-role

  NodeGroupInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${ClusterName}-nodegroup-profile
      Roles:
        - !Ref NodeGroupRole

Outputs:
  ClusterRoleArn:
    Value: !GetAtt ClusterRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-ClusterRoleArn

  NodeGroupRoleArn:
    Value: !GetAtt NodeGroupRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-NodeGroupRoleArn

  NodeGroupInstanceProfileArn:
    Value: !GetAtt NodeGroupInstanceProfile.Arn
    Export:
      Name: !Sub ${AWS::StackName}-NodeGroupInstanceProfileArn
