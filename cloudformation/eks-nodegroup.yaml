AWSTemplateFormatVersion: '2010-09-09'
Description: EKS managed node group for sandbox environment

Parameters:
  ClusterName:
    Type: String
  VpcStackName:
    Type: String
  IamStackName:
    Type: String
  ClusterStackName:
    Type: String
  NodeInstanceType:
    Type: String
    Default: t3.medium
  NodeMinSize:
    Type: Number
    Default: 1
  NodeMaxSize:
    Type: Number
    Default: 3
  NodeDesiredSize:
    Type: Number
    Default: 2
  NodeDiskSize:
    Type: Number
    Default: 20

Resources:
  NodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !ImportValue
        Fn::Sub: ${ClusterStackName}-ClusterName
      NodegroupName: !Sub ${ClusterName}-nodegroup
      NodeRole: !ImportValue
        Fn::Sub: ${IamStackName}-NodeGroupRoleArn
      Subnets:
        - !ImportValue
          Fn::Sub: ${VpcStackName}-PrivateSubnet1Id
        - !ImportValue
          Fn::Sub: ${VpcStackName}-PrivateSubnet2Id
      ScalingConfig:
        MinSize: !Ref NodeMinSize
        MaxSize: !Ref NodeMaxSize
        DesiredSize: !Ref NodeDesiredSize
      InstanceTypes:
        - !Ref NodeInstanceType
      AmiType: AL2_x86_64
      CapacityType: ON_DEMAND
      DiskSize: !Ref NodeDiskSize
      Labels:
        environment: sandbox
      Tags:
        Name: !Sub ${ClusterName}-nodes

  # CoreDNS is a Deployment and requires nodes to schedule — install after NodeGroup
  CoreDnsAddon:
    Type: AWS::EKS::Addon
    DependsOn: NodeGroup
    Properties:
      ClusterName: !ImportValue
        Fn::Sub: ${ClusterStackName}-ClusterName
      AddonName: coredns
      ResolveConflicts: OVERWRITE

Outputs:
  NodeGroupName:
    Value: !Ref NodeGroup
    Export:
      Name: !Sub ${AWS::StackName}-NodeGroupName
