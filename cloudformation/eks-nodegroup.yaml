AWSTemplateFormatVersion: '2010-09-09'
Description: EKS managed node group for sandbox environment

Parameters:
  ClusterName:
    Type: String
  VpcStackName:
    Type: String
  IamStackName:
    Type: String
  ClusterStackName:
    Type: String
  NodeInstanceType:
    Type: String
    Default: t3.medium
  NodeMinSize:
    Type: Number
    Default: 1
  NodeMaxSize:
    Type: Number
    Default: 3
  NodeDesiredSize:
    Type: Number
    Default: 2
  NodeDiskSize:
    Type: Number
    Default: 20

Resources:
  NodeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ClusterName}-node-sg
      GroupDescription: Security group for EKS worker nodes
      VpcId: !ImportValue
        Fn::Sub: ${VpcStackName}-VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-node-sg
        - Key: !Sub kubernetes.io/cluster/${ClusterName}
          Value: owned

  NodeToNodeIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecurityGroup
      SourceSecurityGroupId: !Ref NodeSecurityGroup
      IpProtocol: '-1'
      Description: Allow node to node communication

  ClusterToNodeIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecurityGroup
      SourceSecurityGroupId: !ImportValue
        Fn::Sub: ${ClusterStackName}-ClusterSecurityGroupId
      IpProtocol: tcp
      FromPort: 1025
      ToPort: 65535
      Description: Allow control plane to reach nodes on ephemeral ports

  ClusterToNodeHttpsIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecurityGroup
      SourceSecurityGroupId: !ImportValue
        Fn::Sub: ${ClusterStackName}-ClusterSecurityGroupId
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      Description: Allow control plane to reach nodes on 443

  NodeToClusterIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !ImportValue
        Fn::Sub: ${ClusterStackName}-ClusterSecurityGroupId
      SourceSecurityGroupId: !Ref NodeSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      Description: Allow nodes to reach cluster API

  NodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !ImportValue
        Fn::Sub: ${ClusterStackName}-ClusterName
      NodegroupName: !Sub ${ClusterName}-nodegroup
      NodeRole: !ImportValue
        Fn::Sub: ${IamStackName}-NodeGroupRoleArn
      Subnets:
        - !ImportValue
          Fn::Sub: ${VpcStackName}-PrivateSubnet1Id
        - !ImportValue
          Fn::Sub: ${VpcStackName}-PrivateSubnet2Id
      ScalingConfig:
        MinSize: !Ref NodeMinSize
        MaxSize: !Ref NodeMaxSize
        DesiredSize: !Ref NodeDesiredSize
      InstanceTypes:
        - !Ref NodeInstanceType
      AmiType: AL2_x86_64
      CapacityType: ON_DEMAND
      DiskSize: !Ref NodeDiskSize
      Labels:
        environment: sandbox
      Tags:
        Name: !Sub ${ClusterName}-nodes

Outputs:
  NodeSecurityGroupId:
    Value: !Ref NodeSecurityGroup
    Export:
      Name: !Sub ${AWS::StackName}-NodeSecurityGroupId

  NodeGroupName:
    Value: !Ref NodeGroup
    Export:
      Name: !Sub ${AWS::StackName}-NodeGroupName
